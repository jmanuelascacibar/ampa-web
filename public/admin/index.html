    <title>Panel de Administración — AMPA</title>

    <!--
      Decap CMS (formerly Netlify CMS) admin panel.

      HOW IT WORKS:
      This page loads Decap CMS from a CDN — no npm package needed.
      When you visit /admin on the live site, the CMS renders here as
      a full single-page app. It reads config.yml (in this same folder)
      to know what content it can edit.

      The CMS commits changes directly to your GitHub repo, so every
      edit made through the admin panel creates a real Git commit.
    -->

    <!-- Decap CMS script — loads the entire admin interface -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </head>
  <body>
    <!--
      Decap CMS replaces the body content with its own React app.
      You don't need to add any HTML here — the script handles everything.
    -->
  </body>
