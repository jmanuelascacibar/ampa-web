<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Panel de Administración — AMPA</title>

    <!--
      Decap CMS (formerly Netlify CMS) admin panel.

      HOW IT WORKS:
      This page loads Decap CMS from a CDN — no npm package needed.
      When you visit /admin on the live site, the CMS renders here as
      a full single-page app. It reads config.yml (in this same folder)
      to know what content it can edit.

      The CMS commits changes directly to your GitHub repo, so every
      edit made through the admin panel creates a real Git commit.
    -->

    <!-- Netlify Identity Widget — must load early for auth -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Decap CMS mounts here — script must be at end of body so the DOM is ready -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
